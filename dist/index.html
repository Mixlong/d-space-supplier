    <style>
      html,
      body,
      #app {
        height: 100%;
        margin: 0px;
        padding: 0px;
      }

      #loader-wrapper {
        position: absolute;
        inset: 0;
        z-index: 999999;
        background: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .loader-pulse {
        display: flex;
        gap: 14px;
      }

      .loader-pulse span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #409eff;
        opacity: 0.35;
        animation: pulse 1.6s infinite ease-in-out;
      }

      .loader-pulse span:nth-child(2) {
        animation-delay: 0.2s;
      }

      .loader-pulse span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.25;
          transform: scale(1);
        }
        50% {
          opacity: 0.9;
          transform: scale(1.4);
        }
      }

      .loaded #loader-wrapper {
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.4s ease;
      }
    </style>
