name: Windows Tauri Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Windows Bundle
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Upload NSIS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*
          if-no-files-found: ignore

      - name: Upload MSI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*
          if-no-files-found: ignore
