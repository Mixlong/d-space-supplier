name: Windows Tauri Build

on:
  workflow_dispatch:
    inputs:
      publish_to_oss:
        description: "Publish to OSS after build"
        required: true
        default: false
        type: boolean
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Strip monorepo-only deps for standalone CI
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));for(const k of ['dependencies','devDependencies','optionalDependencies']){if(!j[k]) continue;for(const name of Object.keys(j[k])){if(name.startsWith('@monorepo/')) delete j[k][name];}}fs.writeFileSync(p,JSON.stringify(j,null,2)+'\\n');"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Disable frontend rebuild in CI (use committed dist)
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));if(!j.build) j.build={};j.build.beforeBuildCommand='';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\\n');"

      - name: Force NSIS only in CI
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.bundle=j.bundle||{};j.bundle.targets=['nsis'];fs.writeFileSync(p,JSON.stringify(j,null,2)+'\\n');"

      - name: Build Windows NSIS Bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target x86_64-pc-windows-msvc --bundles nsis

      - name: Upload NSIS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/**
          if-no-files-found: ignore

      - name: Install ossutil
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_to_oss == true }}
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://gosspublic.alicdn.com/ossutil/1.7.16/ossutil64.zip" -OutFile "ossutil64.zip"
          Expand-Archive -Path "ossutil64.zip" -DestinationPath "."
          Get-ChildItem -Recurse -Path "." | Where-Object { $_.Name -eq "ossutil64.exe" } | Select-Object -First 1 | ForEach-Object { $_.FullName } > ossutil_path.txt

      - name: Publish to OSS
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_to_oss == true }}
        shell: pwsh
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_REGION: ${{ secrets.OSS_REGION }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          if (-not $env:OSS_ACCESS_KEY_ID -or -not $env:OSS_ACCESS_KEY_SECRET -or -not $env:OSS_ENDPOINT -or -not $env:OSS_BUCKET) {
            throw "Missing OSS secrets. Required: OSS_ACCESS_KEY_ID, OSS_ACCESS_KEY_SECRET, OSS_ENDPOINT, OSS_BUCKET"
          }
          $region = $env:OSS_REGION
          if (-not $region) {
            $endpointHost = $env:OSS_ENDPOINT -replace '^https?://', '' -replace '/.*$', ''
            if ($endpointHost -match '^oss-([a-z0-9-]+)(-internal)?\.aliyuncs\.com$') {
              $region = $Matches[1]
            }
          }
          if (-not $region) { $region = "cn-shenzhen" }
          Write-Host "Using OSS region: $region"
          $ossutil = Get-Content ossutil_path.txt | Select-Object -First 1
          $bundleDir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          $exe = Get-ChildItem -Path $bundleDir -Filter *.exe | Select-Object -First 1
          $sig = Get-ChildItem -Path $bundleDir -Filter *.sig | Select-Object -First 1
          if (-not $exe) { throw "Missing required artifact: exe" }
          if (-not $sig) { throw "Missing required artifact: sig" }
          $dest = "oss://$($env:OSS_BUCKET)/d-space/supplier-desktop/windows"
          $fixedExeName = "D-Space-x64-setup.exe"
          $fixedSigName = "D-Space-x64-setup.exe.sig"
          $fixedExeUrl = "https://$($env:OSS_BUCKET).oss-$region.aliyuncs.com/d-space/supplier-desktop/windows/$fixedExeName"
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $version = $pkg.version
          $signature = (Get-Content $sig.FullName -Raw).Trim()
          $latestObj = @{
            version = $version
            notes = ""
            pub_date = (Get-Date).ToUniversalTime().ToString("o")
            url = $fixedExeUrl
            signature = $signature
          }
          $generatedLatest = Join-Path $env:RUNNER_TEMP "latest.json"
          $latestObj | ConvertTo-Json -Depth 5 | Out-File -FilePath $generatedLatest -Encoding utf8
          $latest = Get-Item $generatedLatest
          Write-Host "Generated latest.json at $generatedLatest"
          # Cleanup old versioned installers/signatures to keep OSS file list clean.
          & $ossutil --region $region rm "$dest/" --recursive --include "*-setup.exe" -e $env:OSS_ENDPOINT -i $env:OSS_ACCESS_KEY_ID -k $env:OSS_ACCESS_KEY_SECRET -u
          & $ossutil --region $region rm "$dest/" --recursive --include "*-setup.exe.sig" -e $env:OSS_ENDPOINT -i $env:OSS_ACCESS_KEY_ID -k $env:OSS_ACCESS_KEY_SECRET -u
          & $ossutil --region $region cp $exe.FullName "$dest/$fixedExeName" -e $env:OSS_ENDPOINT -i $env:OSS_ACCESS_KEY_ID -k $env:OSS_ACCESS_KEY_SECRET -u
          & $ossutil --region $region cp $sig.FullName "$dest/$fixedSigName" -e $env:OSS_ENDPOINT -i $env:OSS_ACCESS_KEY_ID -k $env:OSS_ACCESS_KEY_SECRET -u
          & $ossutil --region $region cp $latest.FullName "$dest/latest.json" -e $env:OSS_ENDPOINT -i $env:OSS_ACCESS_KEY_ID -k $env:OSS_ACCESS_KEY_SECRET -u
