name: Windows Tauri Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Strip monorepo-only deps for standalone CI
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));for(const k of ['dependencies','devDependencies','optionalDependencies']){if(!j[k]) continue;for(const name of Object.keys(j[k])){if(name.startsWith('@monorepo/')) delete j[k][name];}}fs.writeFileSync(p,JSON.stringify(j,null,2)+'\\n');"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Disable frontend rebuild in CI (use committed dist)
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));if(!j.build) j.build={};j.build.beforeBuildCommand='';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\\n');"

      - name: Build Windows NSIS Bundle
        run: pnpm tauri build --target x86_64-pc-windows-msvc --bundles nsis

      - name: Upload NSIS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*
          if-no-files-found: ignore
