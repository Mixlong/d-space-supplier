name: macOS Tauri Build

on:
  workflow_dispatch:
    inputs:
      publish_to_oss:
        description: "Publish to OSS after build"
        required: true
        default: false
        type: boolean
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Strip monorepo-only deps for standalone CI
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));for(const k of ['dependencies','devDependencies','optionalDependencies']){if(!j[k]) continue;for(const name of Object.keys(j[k])){if(name.startsWith('@monorepo/')) delete j[k][name];}}fs.writeFileSync(p,JSON.stringify(j,null,2)+'\\n');"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Disable frontend rebuild in CI (use committed dist)
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));if(!j.build) j.build={};j.build.beforeBuildCommand='';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\\n');"

      - name: Force app + dmg bundle in CI
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.bundle=j.bundle||{};j.bundle.targets=['app','dmg'];fs.writeFileSync(p,JSON.stringify(j,null,2)+'\\n');"

      - name: Build macOS App + DMG Bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles app,dmg

      - name: Upload macOS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-dmg
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.tar.gz
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/**/latest.json
          if-no-files-found: ignore

      - name: Install ossutil
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_to_oss == true }}
        shell: bash
        run: |
          set -euo pipefail
          OSSUTIL_VERSION="2.2.1"
          ARCH="$(uname -m)"
          if [ "$ARCH" = "arm64" ] || [ "$ARCH" = "aarch64" ]; then
            PKG="ossutil-${OSSUTIL_VERSION}-mac-arm64.zip"
          else
            PKG="ossutil-${OSSUTIL_VERSION}-mac-amd64.zip"
          fi
          curl -fsSL -o "$PKG" "https://gosspublic.alicdn.com/ossutil/v2/${OSSUTIL_VERSION}/${PKG}"
          unzip -o "$PKG" -d .
          OSSUTIL_BIN="$(find . -type f -path "*/ossutil" | head -n 1)"
          test -n "$OSSUTIL_BIN"
          chmod +x "$OSSUTIL_BIN"
          echo "OSSUTIL_BIN=$OSSUTIL_BIN" >> "$GITHUB_ENV"

      - name: Publish to OSS
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_to_oss == true }}
        shell: bash
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_REGION: ${{ secrets.OSS_REGION }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          set -euo pipefail
          test -n "${OSS_ACCESS_KEY_ID:-}" && test -n "${OSS_ACCESS_KEY_SECRET:-}" && test -n "${OSS_ENDPOINT:-}" && test -n "${OSS_BUCKET:-}"
          REGION="${OSS_REGION:-}"
          if [ -z "$REGION" ]; then
            REGION="$(printf '%s' "$OSS_ENDPOINT" | sed -E 's#^https?://##; s#/.*$##' | sed -nE 's#^oss-([a-z0-9-]+)(-internal)?\.aliyuncs\.com$#\1#p')"
          fi
          if [ -z "$REGION" ]; then
            REGION="cn-shenzhen"
          fi
          test -n "$REGION"
          echo "Using OSS region: $REGION"
          OSSUTIL="${OSSUTIL_BIN:-$(find . -type f -path "*/ossutil" | head -n 1)}"
          test -n "$OSSUTIL"
          BUNDLE_DIR="src-tauri/target/release/bundle"
          DMG_FILE=$(find "$BUNDLE_DIR" -type f -name '*.dmg' | head -n 1 || true)
          TAR_FILE=$(find "$BUNDLE_DIR" -type f -name '*.tar.gz' | head -n 1 || true)
          SIG_FILE=$(find "$BUNDLE_DIR" -type f -name '*.sig' | head -n 1 || true)
          LATEST_JSON=$(find "$BUNDLE_DIR" -type f -name 'latest.json' | head -n 1 || true)
          test -n "$DMG_FILE"
          if [ -z "$TAR_FILE" ] || [ -z "$SIG_FILE" ]; then
            echo "::error::Updater artifacts missing. Require .tar.gz + .sig for auto update."
            find "$BUNDLE_DIR" -type f | sed -n '1,200p'
            exit 1
          fi
          FIXED_DMG_NAME="D-Space.dmg"
          FIXED_DMG_URL="https://${OSS_BUCKET}.oss-${REGION}.aliyuncs.com/d-space/supplier-desktop/darwin/${FIXED_DMG_NAME}"
          APP_VERSION=$(node -e "const fs=require('fs');const c=JSON.parse(fs.readFileSync('package.json','utf8'));process.stdout.write(c.version)")
          GENERATED_LATEST="${RUNNER_TEMP}/latest.json"
          node -e "const fs=require('fs');const out=process.argv[1];const version=process.argv[2];const dmgUrl=process.argv[3];const sigFile=process.argv[4];const sig=fs.readFileSync(sigFile,'utf8').trim();const data={version,notes:'',pub_date:new Date().toISOString(),url:dmgUrl,signature:sig};fs.writeFileSync(out,JSON.stringify(data,null,2)+'\\n');" "$GENERATED_LATEST" "$APP_VERSION" "$FIXED_DMG_URL" "$SIG_FILE"
          LATEST_JSON="$GENERATED_LATEST"
          echo "Generated latest.json at $LATEST_JSON"
          DESTS=("oss://${OSS_BUCKET}/d-space/supplier-desktop/darwin")
          for DEST in "${DESTS[@]}"; do
            # Cleanup legacy app-bundle directory from previous recursive uploads.
            "$OSSUTIL" --region "$REGION" rm "$DEST/Contents" --recursive -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" -u || true
            # Keep only one dmg object to avoid accumulating versioned installers.
            "$OSSUTIL" --region "$REGION" rm "$DEST/" --recursive --include "*.dmg" -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" -u || true
            "$OSSUTIL" --region "$REGION" cp "$DMG_FILE" "$DEST/$FIXED_DMG_NAME" -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" -u
            "$OSSUTIL" --region "$REGION" cp "$TAR_FILE" "$DEST/" -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" -u
            "$OSSUTIL" --region "$REGION" cp "$SIG_FILE" "$DEST/" -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" -u
            "$OSSUTIL" --region "$REGION" cp "$LATEST_JSON" "$DEST/latest.json" -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" -u
          done
