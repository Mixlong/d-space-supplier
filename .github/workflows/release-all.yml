name: Release Desktop (Win+Mac)

on:
  workflow_dispatch:
    inputs:
      publish_to_oss:
        description: "Publish both platforms to OSS"
        required: true
        default: true
        type: boolean

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Strip monorepo-only deps for standalone CI
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));for(const k of ['dependencies','devDependencies','optionalDependencies']){if(!j[k]) continue;for(const name of Object.keys(j[k])){if(name.startsWith('@monorepo/')) delete j[k][name];}}fs.writeFileSync(p,JSON.stringify(j,null,2)+'\\n');"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Disable frontend rebuild and force NSIS
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.build=j.build||{};j.build.beforeBuildCommand='';j.bundle=j.bundle||{};j.bundle.targets=['nsis'];fs.writeFileSync(p,JSON.stringify(j,null,2)+'\\n');"

      - name: Build Windows NSIS Bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target x86_64-pc-windows-msvc --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*
          if-no-files-found: error

      - name: Install ossutil
        if: ${{ inputs.publish_to_oss == true }}
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://gosspublic.alicdn.com/ossutil/1.7.16/ossutil64.zip" -OutFile "ossutil64.zip"
          Expand-Archive -Path "ossutil64.zip" -DestinationPath "."
          Get-ChildItem -Recurse -Path "." | Where-Object { $_.Name -eq "ossutil64.exe" } | Select-Object -First 1 | ForEach-Object { $_.FullName } > ossutil_path.txt

      - name: Publish Windows to OSS
        if: ${{ inputs.publish_to_oss == true }}
        shell: pwsh
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          $ossutil = Get-Content ossutil_path.txt | Select-Object -First 1
          $bundleDir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          $exe = Get-ChildItem -Path $bundleDir -Filter *.exe | Select-Object -First 1
          $sig = Get-ChildItem -Path $bundleDir -Filter *.sig | Select-Object -First 1
          $latest = Get-ChildItem -Path $bundleDir -Filter latest.json -Recurse | Select-Object -First 1
          if (-not $exe -or -not $sig -or -not $latest) { throw "Missing artifact(s): exe/sig/latest.json" }
          $dest = "oss://$($env:OSS_BUCKET)/d-space/supplier-desktop/windows"
          & $ossutil cp $exe.FullName "$dest/" -e $env:OSS_ENDPOINT -i $env:OSS_ACCESS_KEY_ID -k $env:OSS_ACCESS_KEY_SECRET -u
          & $ossutil cp $sig.FullName "$dest/" -e $env:OSS_ENDPOINT -i $env:OSS_ACCESS_KEY_ID -k $env:OSS_ACCESS_KEY_SECRET -u
          & $ossutil cp $latest.FullName "$dest/latest.json" -e $env:OSS_ENDPOINT -i $env:OSS_ACCESS_KEY_ID -k $env:OSS_ACCESS_KEY_SECRET -u

  macos:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Strip monorepo-only deps for standalone CI
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));for(const k of ['dependencies','devDependencies','optionalDependencies']){if(!j[k]) continue;for(const name of Object.keys(j[k])){if(name.startsWith('@monorepo/')) delete j[k][name];}}fs.writeFileSync(p,JSON.stringify(j,null,2)+'\\n');"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Disable frontend rebuild and force app bundle
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.build=j.build||{};j.build.beforeBuildCommand='';j.bundle=j.bundle||{};j.bundle.targets=['app'];fs.writeFileSync(p,JSON.stringify(j,null,2)+'\\n');"

      - name: Build macOS App Bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles app

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: src-tauri/target/release/bundle/macos/*
          if-no-files-found: error

      - name: Install ossutil
        if: ${{ inputs.publish_to_oss == true }}
        shell: bash
        run: |
          curl -fsSL -o ossutil.zip https://gosspublic.alicdn.com/ossutil/1.7.16/ossutilmac64.zip
          unzip -o ossutil.zip -d .
          chmod +x ./ossutil*/ossutil64

      - name: Publish macOS to OSS
        if: ${{ inputs.publish_to_oss == true }}
        shell: bash
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          set -euo pipefail
          OSSUTIL=$(find . -type f -name ossutil64 | head -n 1)
          BUNDLE_DIR="src-tauri/target/release/bundle"
          APP_FILE=$(find "$BUNDLE_DIR" -type d -name '*.app' | head -n 1 || true)
          TAR_FILE=$(find "$BUNDLE_DIR" -type f -name '*.tar.gz' | head -n 1 || true)
          SIG_FILE=$(find "$BUNDLE_DIR" -type f -name '*.sig' | head -n 1 || true)
          LATEST_JSON=$(find "$BUNDLE_DIR" -type f -name 'latest.json' | head -n 1 || true)
          test -n "$APP_FILE"
          DEST="oss://${OSS_BUCKET}/d-space/supplier-desktop/mac"
          "$OSSUTIL" cp "$APP_FILE" "$DEST/" -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" -u
          if [ -n "$TAR_FILE" ] && [ -n "$SIG_FILE" ] && [ -n "$LATEST_JSON" ]; then
            "$OSSUTIL" cp "$TAR_FILE" "$DEST/" -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" -u
            "$OSSUTIL" cp "$SIG_FILE" "$DEST/" -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" -u
            "$OSSUTIL" cp "$LATEST_JSON" "$DEST/latest.json" -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" -u
          fi
